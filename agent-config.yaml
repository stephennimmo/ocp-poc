apiVersion: v1alpha1
kind: AgentConfig
metadata:
  name: ocp-poc
rendezvousIP: 10.0.0.4
hosts:
  - hostname: control-plane-0
    role: control-plane
    interfaces:
      - name: enp1s0
        macAddress: 52:54:00:aa:bb:00
    networkConfig:
      interfaces:
        - name: enp1s0
          type: ethernet
          state: up
          mac-address: 52:54:00:aa:bb:00
          ipv4:
            enabled: true
            address:
              - ip: 10.0.0.4
                prefix-length: 28
            dhcp: false
      dns-resolver:
        config:
          server:
            - 9.9.9.9
            - 149.112.112.112
      routes:
        config:
          - destination: 0.0.0.0/0
            next-hop-address: 10.0.0.1
            next-hop-interface: enp1s0
